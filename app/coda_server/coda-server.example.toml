# Each provider is an OpenAI-compatible endpoint. `kind` selects request quirks:
#   "generic"  — standard OpenAI-compatible API (default)
#   "deepseek" — toggles thinking via DeepSeek's `thinking` field
# `api_key` and `base_url` may reference an environment variable as `${VAR}`.
# `models` lists the models under this provider; each model has a required `id`
# (the API model name sent in requests), an optional `name` (human-readable
# dashboard label, defaults to `id`), a required `context_window`, optional
# `reasoning_efforts` (arbitrary strings passed to the provider API; `"off"` is
# reserved for turning thinking off — omit it if the model doesn't support
# disabling thinking), and optional `input_modalities` (defaults to ["text"];
# add "image" to allow image attachments).
# The dashboard picks which model a session uses; the first listed is the default.

[[providers]]
id = "deepseek"
kind = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
models = [
  { id = "deepseek-reasoner", name = "DeepSeek R1", context_window = 128000, reasoning_efforts = ["low", "medium", "high"] },
  { id = "deepseek-chat", name = "DeepSeek V3", context_window = 128000 },
]

[[providers]]
id = "openai"
api_key = "${OPENAI_API_KEY}"
base_url = "https://api.openai.com/v1"
models = [
  { id = "gpt-4o", name = "GPT-4o", context_window = 128000, input_modalities = ["text", "image"] },
]

[[workspaces]]
id = "coda"
path = "/path/to/coda"

[[workspaces]]
id = "scratch"
path = "/path/to/scratch"
