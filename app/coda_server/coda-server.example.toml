# Each provider is an OpenAI-compatible endpoint. `kind` selects request quirks:
#   "generic"  — standard OpenAI-compatible API (default)
#   "deepseek" — toggles thinking via DeepSeek's `thinking` field
#   "openrouter" — OpenRouter reasoning details and continuation protocol
# `api_key` and `base_url` may reference an environment variable as `${VAR}`.
# `models` lists the models under this provider; each model has a required `id`
# (the API model name sent in requests), an optional `name` (human-readable
# dashboard label, defaults to `id`), a required `context_window`, optional
# `reasoning_efforts` (arbitrary strings passed to the provider API; `"off"` is
# reserved for turning thinking off — omit it if the model doesn't support
# disabling thinking), optional `default_reasoning_effort` (the recommended
# initial effort level — must be one of `reasoning_efforts`; defaults to the
# first entry when absent), and optional `input_modalities` (defaults to ["text"];
# add "image" to allow image attachments), and optional
# `max_completion_tokens` (positive and no larger than `context_window`).
# The dashboard picks which model a session uses; the first listed is the default.

[[providers]]
id = "deepseek"
kind = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
models = [
  { id = "deepseek-reasoner", name = "DeepSeek R1", context_window = 128000, reasoning_efforts = ["low", "medium", "high"], default_reasoning_effort = "medium" },
  { id = "deepseek-chat", name = "DeepSeek V3", context_window = 128000 },
]

[[providers]]
id = "openrouter"
kind = "openrouter"
api_key = "${OPENROUTER_API_KEY}"
base_url = "https://openrouter.ai/api/v1"
models = [
  { id = "x-ai/grok-4.5", name = "Grok 4.5", context_window = 500000, max_completion_tokens = 16384, reasoning_efforts = ["high", "medium", "low"], default_reasoning_effort = "high", input_modalities = ["text", "image"] },
  { id = "moonshotai/kimi-k3", name = "Kimi K3", context_window = 1048576, max_completion_tokens = 32768, reasoning_efforts = ["off", "max", "high", "low"], default_reasoning_effort = "max", input_modalities = ["text", "image"] },
  { id = "z-ai/glm-5.2", name = "GLM 5.2", context_window = 1048576, max_completion_tokens = 32768, reasoning_efforts = ["off", "xhigh", "high"], default_reasoning_effort = "high" },
]

[[workspaces]]
id = "coda"
path = "/path/to/coda"

[[workspaces]]
id = "scratch"
path = "/path/to/scratch"
