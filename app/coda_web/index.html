<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fcfbf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#262321" media="(prefers-color-scheme: dark)" />
    <script>
      (() => {
        // Pre-CSS seed to avoid a flash before the stylesheet loads; must match
        // --background in src/index.css (:root / .dark). Cleared by
        // applyThemePreference() once the app mounts and CSS takes over.
        const colors = { light: "#fcfbf9", dark: "#262321" };
        const saved = localStorage.getItem("coda-theme");
        const preference =
          saved === "light" || saved === "dark" || saved === "system" ? saved : "system";
        const theme =
          preference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference;
        const color = colors[theme];
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme;
        document.documentElement.style.setProperty("background-color", color, "important");
        const style = document.createElement("style");
        style.id = "theme-seed";
        style.textContent = `html,body{background-color:${color}!important}`;
        document.head.append(style);
      })();
    </script>
    <title>Coda</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
