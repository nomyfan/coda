# Example server config. Run the server against it with:
#
#   CODA_SERVER_CONFIG=examples/coda-server.toml cargo run -p coda_server --bin coda-server
#
# It declares the LLM providers the dashboard can choose from, and the
# workspaces sessions are scoped to. See `examples/README.md` for a tour of the
# `.coda/` configuration inside the workspace.

# --- Providers ---------------------------------------------------------------
# Each provider is an OpenAI-compatible endpoint. `kind` selects request quirks:
#   "generic"  — standard OpenAI-compatible API (default)
#   "deepseek" — toggles thinking via DeepSeek's `thinking` field
#   "openrouter" — OpenRouter reasoning details and continuation protocol
# `api_key` / `base_url` may reference an environment variable as `${VAR}`.
# Each model needs an `id` (the API model name) and a `context_window`; `name`,
# `reasoning_efforts`, `input_modalities`, and `max_completion_tokens` are optional.
# `reasoning_efforts` is an array of arbitrary strings passed to the provider API;
# `"off"` is reserved for turning thinking off (omit it if the model doesn't
# support disabling thinking). `default_reasoning_effort` optionally names the
# recommended initial level (must be one of `reasoning_efforts`; defaults to
# the first entry when absent).

[[providers]]
id = "deepseek"
kind = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
models = [
  { id = "deepseek-v4-pro", name = "DeepSeek V4 Pro", context_window = 1000000, reasoning_efforts = ["xhigh", "high"] },
  { id = "deepseek-v4-flash", name = "DeepSeek V4 Flash", context_window = 1000000, reasoning_efforts = ["xhigh", "high"] },
]

[[providers]]
id = "openrouter"
kind = "openrouter"
api_key = "${OPENROUTER_API_KEY}"
base_url = "https://openrouter.ai/api/v1"
models = [
  { id = "x-ai/grok-4.5", name = "Grok 4.5", context_window = 500000, max_completion_tokens = 16384, reasoning_efforts = ["high", "medium", "low"], default_reasoning_effort = "high", input_modalities = ["text", "image"] },
  { id = "moonshotai/kimi-k3", name = "Kimi K3", context_window = 1048576, max_completion_tokens = 32768, reasoning_efforts = ["off", "max", "high", "low"], default_reasoning_effort = "max", input_modalities = ["text", "image"] },
  { id = "z-ai/glm-5.2", name = "GLM 5.2", context_window = 1048576, max_completion_tokens = 32768, reasoning_efforts = ["off", "xhigh", "high"], default_reasoning_effort = "high" },
]

# --- Workspaces --------------------------------------------------------------
# Sessions are scoped to a workspace. `path` is resolved (and canonicalized) at
# startup, relative to *this config file's directory* (so `workspace` points at
# examples/workspace). Point it at an absolute path in real use.

[[workspaces]]
id = "demo"
path = "workspace"
